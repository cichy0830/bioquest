<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>生命祕境 BioQuest｜發霉吐司調查任務</title>
  <link rel="stylesheet" href="styles.css?v=20260711-unit23-title-avatar-v1">
</head>
<body>
  <div class="app-shell">
    <aside class="side-panel">
      <div class="brand">
        <div class="brand-mark">BQ</div>
        <div>
          <p class="eyebrow">生命祕境 BioQuest</p>
          <h1>發霉吐司調查任務</h1>
        </div>
      </div>

      <nav class="step-list" aria-label="任務流程">
        <button class="step-item active" data-nav="login">登入</button>
        <button class="step-item" data-nav="brief" disabled>簡報</button>
        <button class="step-item" data-nav="scan" disabled>準備</button>
        <button class="step-item" data-nav="checkpoint1" disabled>流程</button>
        <button class="step-item" data-nav="checkpoint2" disabled>變因</button>
        <button class="step-item" data-nav="checkpoint3" disabled>資料</button>
        <button class="step-item" data-nav="checkpoint4" disabled>修正</button>
        <button class="step-item" data-nav="review" disabled>回饋</button>
        <button class="step-item" data-nav="reflection" disabled>回報</button>
        <button class="step-item" data-nav="result" disabled>結算</button>
        <button class="step-item" data-nav="achievements" disabled>成就</button>
        <button class="step-item" data-nav="rules">規則</button>
      </nav>

      <div class="student-mini" id="studentMini">
        <p class="muted">尚未登入</p>
      </div>
    </aside>

    <main class="main-stage">
      <section id="screen" class="screen" aria-live="polite"></section>
    </main>
  </div>

  <script src="../shared-assets/bioquest-title-progress.js?v=20260711-title-nonlinear-v2"></script>
  <script src="app.js?v=20260711-title-nonlinear-v2"></script>
</body>
</html>
